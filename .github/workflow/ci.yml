name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for syntax errors
        run: node --check src/server.js src/routes/*.js src/services/*.js

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t call-translator:${{ github.sha }} .

      - name: Smoke test container starts
        run: |
          docker run -d --name test-app \
            -e TWILIO_ACCOUNT_SID=ACtest \
            -e TWILIO_AUTH_TOKEN=test \
            -e TWILIO_PHONE_NUMBER=+1234567890 \
            -e OPENAI_API_KEY=sk-test \
            -e ELEVENLABS_API_KEY=test \
            -e SERVER_URL=http://localhost:3000 \
            -e DEFAULT_TARGET_NUMBER=+49000000000 \
            -p 3000:3000 \
            call-translator:${{ github.sha }}
          sleep 3
          curl -f http://localhost:3000/ || exit 1
          docker stop test-app
